name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libsqlite3-dev

      - name: Generate go.sum
        run: go mod tidy

      - name: Run tests
        run: go test ./... -race -count=1

      - name: Build
        run: CGO_ENABLED=1 go build -o gohole ./cmd/gohole

  release:
    name: Release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: "6"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc libsqlite3-dev

      - name: Generate go.sum
        run: go mod tidy

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
        run: |
          SUFFIX="${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then SUFFIX="${SUFFIX}v${{ matrix.goarm }}"; fi
          go build -ldflags="-w -s -X main.version=${{ github.ref_name }}" \
            -o "gohole_${SUFFIX}" ./cmd/gohole

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gohole-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gohole_*
