dns:
  listen_addr: "0.0.0.0:53"
  upstream:
    - "1.1.1.1:53"
    - "8.8.8.8:53"
  sinkhole_ip: "0.0.0.0"

dashboard:
  listen_addr: "0.0.0.0:8080"
  username: "admin"
  password: "changeme123"   # ← CHANGE THIS before deploying

database:
  path: "gohole.db"

cache:
  max_entries: 10000

blocklists:
  auto_update: true
  update_interval: 24h
  sources:
    - name: "StevenBlack Unified"
      url: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
      format: "hosts"
      enabled: true

    - name: "Malware Domains (URLhaus)"
      url: "https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-hosts.txt"
      format: "hosts"
      enabled: true

    - name: "AdGuard DNS Filter"
      url: "https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt"
      format: "abp"
      enabled: true

    - name: "OISD Big (wildcard)"
      url: "https://big.oisd.nl/domainswild"
      format: "domains"
      enabled: false

    - name: "No-Track (Tracking)"
      url: "https://raw.githubusercontent.com/notracking/hosts-blocklists/master/dnscrypt-proxy/dnscrypt-proxy.blacklist.txt"
      format: "domains"
      enabled: false

# Domains to never block (override blocklists)
whitelist:
  # - "safe.example.com"

# Additional domains to always block
blacklist:
  # - "ads.custom-site.com"
